<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Rail | Auth</title>
  <link rel="stylesheet" href="./css/index.css">
</head>
<body style="align-items: center; justify-content: center; min-height: 100vh;">

  <div class="glass-panel auth-container">
    <h2 class="text-center" id="form-title">Welcome Back</h2>
    <p class="text-center mb-2" style="color: #666;" id="form-subtitle">Login to book your tickets</p>
    
    <form id="auth-form">
      <div class="form-group" id="name-group" style="display: none;">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn" id="submit-btn" style="margin-top: 1rem;">Login</button>
    </form>
    
    <div class="text-center mt-4">
      <span id="toggle-text">Don't have an account? <a href="#" id="toggle-form" style="color: var(--primary-color); font-weight:600;">Register Here</a></span>
    </div>
  </div>

  <div id="toast"></div>

  <script src="./js/api.js"></script>
  <script>
    let isLogin = true;
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('action') === 'register') {
      isLogin = false;
    }

    const form = document.getElementById('auth-form');
    const toggleBtn = document.getElementById('toggle-form');
    const nameGroup = document.getElementById('name-group');
    const formTitle = document.getElementById('form-title');
    const formSubtitle = document.getElementById('form-subtitle');
    const submitBtn = document.getElementById('submit-btn');
    const toggleText = document.getElementById('toggle-text');

    const updateFormUI = () => {
      if (isLogin) {
        nameGroup.style.display = 'none';
        formTitle.innerText = 'Welcome Back';
        formSubtitle.innerText = 'Login to book your tickets';
        submitBtn.innerText = 'Login';
        toggleText.innerHTML = `Don't have an account? <a href="#" id="toggle-form" style="color: var(--primary-color); font-weight:600;" onclick="arguments[0].preventDefault(); isLogin=false; updateFormUI();">Register Here</a>`;
      } else {
        nameGroup.style.display = 'block';
        formTitle.innerText = 'Create Account';
        formSubtitle.innerText = 'Join Smart Rail today';
        submitBtn.innerText = 'Register';
        toggleText.innerHTML = `Already have an account? <a href="#" id="toggle-form" style="color: var(--primary-color); font-weight:600;" onclick="arguments[0].preventDefault(); isLogin=true; updateFormUI();">Login Here</a>`;
      }
    };

    updateFormUI();

    toggleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      updateFormUI();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;

      try {
        let res;
        if (isLogin) {
          res = await window.api.auth.login(email, password);
        } else {
          // Defaults to user role. Admin must be set via DB manually for security or via special secret.
          res = await window.api.auth.register(name, email, password, 'user');
        }

        localStorage.setItem('token', res.token);
        localStorage.setItem('user', JSON.stringify({ name: res.name, email: res.email, role: res.role, _id: res._id }));
        
        window.showToast('Authentication Successful!');
        setTimeout(() => {
          if (res.role === 'admin') window.location.href = 'admin.html';
          else window.location.href = 'index.html';
        }, 1000);
      } catch (err) {
        window.showToast(err.message, true);
      }
    });
  </script>
</body>
</html>
