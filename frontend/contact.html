<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Rail | Contact Us</title>
  <link rel="stylesheet" href="./css/index.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">🚆 Smart Rail</a>
    <ul id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li id="auth-link"></li>
    </ul>
  </nav>

  <main style="align-items: center; justify-content: center;">
    <div class="glass-panel" style="max-width: 600px; width: 100%;">
      <h2 class="text-center">Contact Support</h2>
      <p class="text-center mb-4">We're here to help! Reach out to us for any queries.</p>

      <form id="contact-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-control" required placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" required placeholder="support@example.com">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea class="form-control" rows="5" required placeholder="How can we help you?"></textarea>
        </div>
        <button type="submit" class="btn btn-accent">Send Message</button>
      </form>
    </div>
  </main>

  <div id="toast"></div>

  <script src="./js/api.js"></script>
  <script>
    if(window.checkAuth) window.checkAuth();
    
    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      window.showToast("Message sent successfully! Our support team will get back to you.", false);
      e.target.reset();
    });
  </script>
</body>
</html>
